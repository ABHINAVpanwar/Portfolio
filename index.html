      /* Active Users Counter Styles */
      #active-users-counter {
        position: fixed;
        bottom: 12px; /* Increased from 10px */
        left: 10px; /* Increased from 10px */
        background-color: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 8px 15px;
        border-radius: 25px;
        font-family: "Rubik", sans-serif;
        font-size: 14px;
        display: flex;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }

      /* Fixed selector - no space */
      #active-users-counter.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Simplified animation */
      @keyframes gentlePulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.03);
        }
        100% {
          transform: scale(1);
        }
      }

      #active-users-counter:hover {
        background-color: rgba(0, 0, 0, 0.85);
        animation: gentlePulse 1.5s infinite;
      }

      /* Remove the hover transform to avoid conflict */
      #active-users-counter:hover {
        transform: none;
      }

      #active-users-counter i {
        margin-right: 8px;
        color: #4caf50;
        font-size: 16px;
        transition: transform 0.3s ease;
      }

      #active-users-counter:hover i {
        transform: scale(1.1);
      }

      .counter-number {
        font-weight: bold;
        margin-left: 5px;
        color: #4caf50;
      }

      .counter-label {
        font-size: 13px;
        opacity: 0.9;
      }

      /* Survey overlay styling */
      .survey-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        z-index: 1000; /* High z-index to ensure it's on top */
        justify-content: center;
        align-items: center;
      }

      .survey-container {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        width: 90%;
        max-width: 500px;
        position: relative;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .survey-close {
        position: absolute;
        top: 1px;
        right: 11px;
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: gray;
      }

      .survey-close:hover {
        color: black;
      }

      .survey-question {
        text-align: center;
        margin-bottom: 20px;
        color: black;
        font-size: 20px;
      }

      .survey-options {
        display: flex;
        flex-direction: column;
      }

      /* Survey button styling */
      .survey-options button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        background: #4caf50;
        color: white;
        border: 2px solid black;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s;
      }

      .survey-options button:hover {
        background: #f38230;
        border: 2px solid black;
        border-radius: 5px;
      }

      /* ── Rating Widget ── */
      #logo-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        position: relative;
      }
      #rating-widget {
        position: relative;
        display: flex;
        align-items: center;
      }
      #rating-display {
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }
      #rating-stars-display { display: none; }
      #rating-avg {
        font-family: 'Poppins', sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
        color: #ffc107;
        letter-spacing: 0.3px;
      }
      #rating-avg::before {
        content: '★ ';
        font-size: 1.2rem;
      }
      /* invisible bridge fills the gap so hover doesn't break */
      #rating-widget::after {
        content: '';
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        height: 16px;
      }
      #rating-popup {
        position: absolute;
        top: calc(100% + 16px);
        left: 0;
        background: rgba(10,10,10,0.95);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(76,175,80,0.3);
        border-radius: 14px;
        padding: 14px 18px;
        min-width: 180px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-4px);
        transition: opacity 0.18s ease, transform 0.18s ease;
        z-index: 99999;
      }
      #rating-widget:hover #rating-popup {
        opacity: 1;
        pointer-events: all;
        transform: translateY(0);
      }
      #rating-prompt {
        font-family: 'Poppins', sans-serif;
        font-size: 10px;
        color: #888;
        margin-bottom: 10px;
        text-align: center;
        letter-spacing: 0.5px;

      #rating-stars {

        gap: 6px;
        justify-content: center;

      }
      .rstar {
        font-size: 22px;
        cursor: pointer;
        transition: transform 0.12s ease, color 0.12s ease;
        line-height: 1;
        color: #444;
      }
      .rstar::before { content: '★'; }
      .rstar.hover { color: #ffc107; transform: scale(1.3); }

      #rating-count {

        font-size: 10px;
        color: #555;
        text-align: center;
      }
      #rating-thanks {
        color: #4caf50;
        font-size: 11px;
      }

    <!-- Rating Widget Script -->
    <script>
      (function () {
        const API = 'https://abhinavpanwar.onrender.com';
        const VOTED_KEY = 'portfolio_rated';
        let hasVoted = !!localStorage.getItem(VOTED_KEY);

        function renderDisplayStars(avg) {}

        async function loadRating() {
          try {
            const res  = await fetch(`${API}/api/rating`, { cache: 'no-store' });
            const data = await res.json();
            document.getElementById('rating-avg').textContent = data.average ? `${data.average}` : '—';
            document.getElementById('rating-count').textContent = data.count ? `${data.count} rating${data.count !== 1 ? 's' : ''}` : 'Be the first!';
            if (hasVoted) markVoted();
          } catch (e) {}
        }

        function markVoted() {
          document.getElementById('rating-prompt').textContent = 'Your rating';
          document.querySelectorAll('.rstar').forEach(s => s.style.cursor = 'default');
        }

        // Star hover & click
        const stars = document.querySelectorAll('.rstar');
        stars.forEach(star => {
          star.addEventListener('mouseenter', () => {
            if (hasVoted) return;
            const v = +star.dataset.v;
            stars.forEach(s => s.classList.toggle('hover', +s.dataset.v <= v));
          });
          star.addEventListener('mouseleave', () => {
            stars.forEach(s => s.classList.remove('hover'));
          });
          star.addEventListener('click', async () => {
            if (hasVoted) return;
            const v = +star.dataset.v;
            stars.forEach(s => {
              s.classList.remove('hover');
              s.classList.toggle('selected', +s.dataset.v <= v);
            });
            try {
              const res  = await fetch(`${API}/api/rating`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stars: v })
              });
              const data = await res.json();
              localStorage.setItem(VOTED_KEY, '1');
              hasVoted = true;
              document.getElementById('rating-avg').textContent = data.average;
              document.getElementById('rating-count').textContent = `${data.count} rating${data.count !== 1 ? 's' : ''}`;
              renderDisplayStars(data.average);
              document.getElementById('rating-count').innerHTML = '<span id="rating-thanks">Thanks! &#10003;</span>';
              setTimeout(() => {
                document.getElementById('rating-count').textContent = `${data.count} rating${data.count !== 1 ? 's' : ''}`;
              }, 2000);
              markVoted();
            } catch (e) { console.error('Rating failed', e); }
          });
        });

        loadRating();
      })();
    </script>

    <!-- Netlify Visitor Tracking -->
    <script>
      (function () {
        // Your Flask app URL (update this with your actual Render/Flask app URL)
        const FLASK_API_URL = "https://abhinavpanwar.onrender.com"; // CHANGE THIS

        function trackPageView() {
          const pageData = {
            page_url: window.location.href,
            page_title: document.title,
            timestamp: new Date().toISOString(),
          };

          fetch(`${FLASK_API_URL}/api/track_netlify_visitor`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            credentials: "include",
            body: JSON.stringify(pageData),
            mode: "cors",
          })
            .then((response) => response.json())
            .then((data) => console.log("Visitor tracked"))
            .catch((error) => console.error("Tracking error:", error));
        }

        // Track on initial page load
        trackPageView();

        // Track on history changes (for single-page apps)
        let lastUrl = location.href;
        new MutationObserver(() => {
          const url = location.href;
          if (url !== lastUrl) {
            lastUrl = url;
            trackPageView();
          }
        }).observe(document, { subtree: true, childList: true });

        // Also track on popstate (back/forward navigation)
        window.addEventListener("popstate", trackPageView);
      })();
    </script>
